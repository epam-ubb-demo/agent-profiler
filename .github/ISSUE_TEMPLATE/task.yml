name: Task
description: Track an implementation, documentation, test, or operations task.
title: "[TASK] "
labels: ["type:task"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List verifiable completion criteria.
    validations:
      required: true
  - type: dropdown
    id: specialist
    attributes:
      label: Specialist
      description: Select the primary specialist owner.
      options:
        - developer
        - infrastructure
        - testing
        - testing-automation
        - code-quality
        - tech-writer
        - business-analyst
        - release-manager
        - onboarding-coach
    validations:
      required: true
  - type: dropdown
    id: complexity
    attributes:
      label: Estimated complexity
      options:
        - XS
        - S
        - M
        - L
        - XL
    validations:
      required: true
  - type: textarea
    id: files-likely-affected
    attributes:
      label: Files likely affected
      description: List expected paths or areas.
      placeholder: |
        - src/...
        - docs/...
  - type: textarea
    id: test-approach
    attributes:
      label: Test approach
      description: How should the change be validated?
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Link blockers, prerequisite issues, or external dependencies.
