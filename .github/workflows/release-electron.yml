name: Release Electron App

# Production trigger: a tag matching `@agent-profiler/desktop@X.Y.Z` pushed to
# main. Delegates the read-only validation + builds to the reusable workflow,
# then runs the writable steps (commit stamped CHANGELOG, create GitHub
# Release) locally so the reusable can stay `contents: read` and the dry-run
# wrapper never needs to grant write permission.

on:
  push:
    tags:
      - '@agent-profiler/desktop@*'

permissions:
  contents: read

concurrency:
  group: release-electron-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/release-electron.reusable.yml
    permissions:
      contents: read
    with:
      tag-name: ${{ github.ref_name }}
      dry-run: false
      platforms: macos,windows,linux
    secrets: inherit

  commit-changelog:
    # Re-stamp against a fresh checkout of main *after* every build succeeded.
    # This protects against two failure modes:
    #
    #   * a build failing late and leaving main half-stamped
    #     (we never write to main unless every requested platform is green);
    #   * main moving between `prepare` (early in the run) and this job
    #     (which can be 20+ min later). The reusable's stamp output is
    #     therefore preview-only and we always re-stamp here against the
    #     current tip of main.
    needs: build
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-sha: ${{ steps.push.outputs.release-sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify desktop package.json still matches the released version
        # Re-check at commit time in case main has advanced into the next
        # release cycle since the reusable's `prepare` job ran.
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          pkg_version=$(node -p "require('./apps/desktop/package.json').version")
          if [[ "${pkg_version}" != "${VERSION}" ]]; then
            echo "::error::apps/desktop/package.json on main is now ${pkg_version}, but this release is for ${VERSION}. Refusing to stamp."
            exit 1
          fi

      - name: Refuse if the version section is already stamped on main
        # Belt-and-braces: if a parallel release already committed this
        # version section, the stamp script would still re-stamp it (the
        # script is idempotent on content, but the date might change). Fail
        # loudly so the operator can decide what to do.
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          if grep -q -E "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md on main already contains a [${VERSION}] section. Refusing to re-stamp."
            exit 1
          fi

      - name: Stamp CHANGELOG.md
        uses: ./.github/actions/stamp-changelog
        with:
          version: ${{ needs.build.outputs.version }}

      - name: Upload final release notes
        # Captured *after* re-stamping against fresh main so the GitHub
        # Release body matches the CHANGELOG section actually committed to
        # main (rather than the preview generated in the reusable's prepare).
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-final
          path: release-notes.md
          if-no-files-found: error
          retention-days: 7

      - name: Commit CHANGELOG bump back to main
        id: push
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "::warning::CHANGELOG.md unchanged after stamp step — skipping commit."
            echo "release-sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(release): @agent-profiler/desktop@${VERSION} [skip ci]"
          # Plain push (no --rebase): if main moved under us, this push is
          # rejected and the operator must investigate. Auto-rebasing here
          # could silently bypass the verification steps above.
          git push origin HEAD:main
          echo "release-sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish:
    needs: [build, commit-changelog]
    if: ${{ needs.commit-changelog.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: installers-*

      - name: Download final release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes-final
          path: notes

      - name: Flatten artifacts
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \
            \( -name '*.dmg' -o -name '*.dmg.blockmap' \
            -o -name '*.exe' -o -name '*.exe.blockmap' \
            -o -name '*.AppImage' -o -name '*.AppImage.blockmap' \
            -o -name '*.deb' \
            -o -name 'latest*.yml' \) \
            -exec cp -v {} release-assets/ \;
          echo "--- Release assets ---"
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Agent Profiler v${{ needs.build.outputs.version }}
          body_path: notes/release-notes.md
          prerelease: ${{ needs.build.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
          files: |
            release-assets/*.dmg
            release-assets/*.dmg.blockmap
            release-assets/*.exe
            release-assets/*.exe.blockmap
            release-assets/*.AppImage
            release-assets/*.AppImage.blockmap
            release-assets/*.deb
            release-assets/latest*.yml
