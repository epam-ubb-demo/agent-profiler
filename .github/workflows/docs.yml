name: Deploy Documentation

on:
  push:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build project docs
        working-directory: docs/project
        run: |
          npm ci
          npm run build
      - name: Build tool docs
        working-directory: docs/tool
        run: |
          npm ci
          npm run build
      - name: Merge dist directories
        run: |
          mkdir -p _site
          cp -r docs/project/dist/* _site/
          cp -r docs/tool/dist/* _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
