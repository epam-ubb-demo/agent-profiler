t` are idempotent (no-op on missing). ### Risks / Assumptions - **Node 25 + better-sqlite3**: The native module requires manual `mkdir` workaround during build (a known issue with node-gyp on Node 25). CI may need the same workaround or should pin Node 20/22. - **No pagination**: `findBySession`/`findByTarget` return all results. Fine for typical annotation counts but could need limits if sessions accumulate thousands. ### Open Questions for Tech Lead - Should we add a `.npmrc` or `pnpm` config to handle the better-sqlite3 native build issue on newer Node versions in CI? - Is the error-on-missing-annotation behavior for `addTag`/`addComment` the desired UX, or should it auto-create the annotation? Now create the PR: ## Summary of Changes ### PR Created: [#218](https://github.com/epam-ubb-demo/agent-profiler/pull/218) ### Changed Files | File | Action | |------|--------| | `apps/desktop/electron-builder.config.ts` | **Created** — Full config for macOS/Windows/Linux | | `apps/desktop/build/entitlements.mac.plist` | **Created** — Hardened runtime entitlements | | `apps/desktop/build/icon.png` | **Created** — 512×512 placeholder (EPAM blue) | | `apps/desktop/package.json` | **Modified** — Added electron-builder dep + 5 scripts | | `.github/workflows/release.yml` | **Created** — Manual-dispatch multi-platform release | | `docs/runbooks/release-macos.md` | **Created** — macOS release runbook | | `docs/runbooks/release-windows.md` | **Created** — Windows release runbook | | `docs/runbooks/release-linux.md` | **Created** — Linux release runbook | | `.gitignore` | **Modified** — `dist-release/` + `!apps/desktop/build/` | | `pnpm-lock.yaml` | **Modified** — electron-builder dependencies | ### Validation Output - ✅ `pnpm install` — Clean install, lockfile updated - ✅ `pnpm --filter @agent-profiler/desktop run build` — Built in 705ms - ✅ `pnpm --filter @agent-profiler/desktop run pack` — Produced `dist-release/mac-arm64/Agent Profiler.app` - ✅ `pnpm --filter @agent-profiler/des