# OTel Collector configuration — prod environment
# Processor ordering: memory_limiter MUST be first in every pipeline

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    limit_mib: 1638
    spike_limit_mib: 400
    check_interval: 1s

  resourcedetection:
    detectors: [env, azure]

  transform/pii:
    error_mode: ignore
    trace_statements:
      - context: resource
        statements:
          - replace_pattern(attributes["process.command_line"], "/home/[^/]+", "REDACTED")
          - replace_pattern(attributes["process.executable.path"], "/home/[^/]+", "REDACTED")
    log_statements:
      - context: resource
        statements:
          - replace_pattern(attributes["process.command_line"], "/home/[^/]+", "REDACTED")
          - replace_pattern(attributes["process.executable.path"], "/home/[^/]+", "REDACTED")

  attributes/env:
    actions:
      - key: deployment.environment
        value: ${env:ENV}
        action: insert
      - key: service.namespace
        value: agent-profiler
        action: insert

  tail_sampling:
    decision_wait: 10s
    num_traces: 100
    expected_new_traces_per_sec: 10
    policies:
      - name: errors-policy
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: normal-sampling
        type: probabilistic
        probabilistic:
          sampling_percentage: ${env:OTEL_SAMPLING_PERCENTAGE:-10}

  batch:
    timeout: 5s
    send_batch_size: 8192

exporters:
  azuremonitor:
    connection_string: ${env:APPLICATIONINSIGHTS_CONNECTION_STRING}
    maxbatchsize: 8192
    maxbatchinterval: 10s

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, transform/pii, attributes/env, tail_sampling, batch]
      exporters: [azuremonitor]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, attributes/env, batch]
      exporters: [azuremonitor]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, transform/pii, attributes/env, batch]
      exporters: [azuremonitor]
